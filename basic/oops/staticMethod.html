<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>static method</title>
  </head>
  <body>
    <script>
      class name {
        static hello(name) {
          document.write(name);
        }
      }

      const color = {
        first: "red",
        second: "green",
        third: "blue"
      }

      document.write(JSON.stringify(color));
      document.write("</br>");


      for(const [key, value] of Object.entries(color)) {
        document.write(`${key} : ${value} </br>`)
      }


      document.write("</br>");

      name.hello("krish");
    </script>
  </body>
</html>
